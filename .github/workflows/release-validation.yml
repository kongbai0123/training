name: Release Tag Validation

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate-tag:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag and repository versions agree
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          $json = Get-Content version.json -Raw | ConvertFrom-Json
          if ("v$version" -ne "${{ github.ref_name }}") { throw "Tag does not match VERSION." }
          if ($json.version -ne $version -or $json.app_version -ne $version) {
            throw "version.json is not synchronized."
          }
          if ($json.runtime_version -notmatch '^r[1-9][0-9]*$') { throw "Invalid runtime_version." }
      - name: Install focused validation dependencies
        run: python -m pip install cryptography==46.0.5 pydantic==2.13.4 fastapi==0.133.1 python-multipart==0.0.27
      - name: Run updater acceptance contracts
        run: python -m unittest discover -s tests -p "test_update_*.py" -v
